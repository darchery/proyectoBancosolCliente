<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Colaboradores</title>
<link rel="stylesheet" href="style_gestion.css">
</head>

<body>

<header class="main-header">
  <div class="logo-area">
    <img src="../../images/LOGO_BANCOSOL_FOOTER.png">
    <div>
      <h1>GESTIÓN DE CAMPAÑAS</h1>
      <h2>Asignacion de Voluntarios</h2>
    </div>
  </div>

  <!-- Badge dinámico según rol -->
  <div class="admin-badge" id="rol-badge">
    Cargando permisos...
  </div>
</header>

<main class="dashboard">

<!-- FILTROS -->
<section class="filters">
  <div class="filter-group">
    <label>USUARIO</label>
    <span id="usuario-display" style="font-weight:bold; padding: 4px 8px;"></span>

    <label>CADENA</label>
    <select id="filtro-cadena">
      <option value="Todas">Todas</option>
      <option value="ALMACHAR">ALMACHAR</option>
    </select>
  </div>

  <div class="filter-group">
    <label>LOCALIDAD</label>
    <select id="filtro-localidad">
      <option>Todas</option>
      <option>Axarquía</option>
    </select>
  </div>
</section>

<div class="content-layout">

  <!-- TABLA -->
  <section class="table-container">
    <table>
      <thead>
        <tr>
          <th>TIENDA</th>
          <th>DOMICILIO</th>
          <th>LOCALIDAD</th>
          <th>CAPITAN</th>
          <th>VIERNES MAÑANA</th>
          <th>VIERNES TARDE</th>
          <th>SABADO MAÑANA</th>
          <th>SABADO TARDE</th>
          <th>OBSERVACIONES</th>
        </tr>
      </thead>
      <tbody id="tabla-body"></tbody>
    </table>
  </section>

  <!-- Botones ADMIN -->
  <div class="action-buttons" id="menu-admin" >
    <button onclick="accion('anadir')">Añadir</button>
    <button onclick="accion('modificar')">Modificar</button>
    <button onclick="accion('guardar')">Guardar</button>
    <button onclick="accion('exportar')">Exportar</button>
    <button onclick="accion('cancelar')">Cancelar</button>
  </div>

</div>
</main>

<script src="asignacion_voluntarios.js"></script>



</body>
</html>
