<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Coordinadores - Bancosol</title>
    <link rel="stylesheet" href="style_gestion.css">
</head>

<body>
    <header class="main-header">
        <div class="logo-area">
            <img src="../../images/LOGO_BANCOSOL_FOOTER.png" alt="Bancosol Logo">
            <div>
                <h1>GESTIÓN DE CAMPAÑAS Coordinadores / Capitanes</h1>
            </div>
        </div>
    </header>

    <main class="dashboard">
        <div class="content-layout">   
            <section class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>COORDINADOR</th>
                            <th>ENTIDAD</th>
                            <th>ÁREA ASIGNADA</th>
                            <th>TELÉFONO</th>
                            <th>CORREO</th>
                            <th>TIENDAS</th>
                            <th>USUARIO</th>
                            <th>CONTRASEÑA</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-body">
                        </tbody>
                </table>
            </section>

            <aside class="details-panel">
                <div class="action-buttons" id="admin-menu" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px;">
                    <button>Añadir</button>
                    <button>Modificar</button>
                    <button>Eliminar</button>
                    <button>Guardar</button>
                    <button>Cancelar</button>
                    <button>Exportar</button>
                </div>
            </aside>
        </div>
    </main>

    <script src="gestion_coordinadores.js"></script>
</body>
</html>
