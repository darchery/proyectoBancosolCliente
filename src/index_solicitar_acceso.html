<!DOCTYPE html>
<html lang="es-ES">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bancosol</title>
    <link rel="stylesheet" href="style_solicitar_acceso.css">
</head>

<body>

   
    <div class="banner">
        <img src="../images/LOGO_BANCOSOL_FOOTER.png" alt="Banner Banco">
    </div>

    <h1>Solicitud de acceso</h1>

    <form>
        <label for="correo_solicitud">
            Introduzca su correo electrónico:
        </label>

        <input 
            type="email" 
            id="correo_solicitud" 
            name="correo_solicitud" 
            placeholder="ejemplo@correo.com"
            required 
        />

        <button type="submit">Enviar solicitud</button>

        <p id="info_solicitud"></p>
    </form>


    <script src="solicitar_acceso.js"></script>
</body>

</html>
