<!DOCTYPE html>
<html lang="es-ES">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Capitán-Coordinador - Panel de Control</title>
  <link rel="stylesheet" href="style_welcome.css">
  <script src="../welcome.js" defer></script>
</head>

<body>

  <header>
    <h1>Bienvenido, Capitán-Coordinador</h1>
    <p class="panel-control">Panel de Control</p>
  </header>

  <main>
    <p class="panel-control">Seleccione qué desea gestionar:</p>
    <section>
      <button class="btn-colaboradores" id="btn-colaboradores-cap-coor">Colaboradores</button>
      <button class="btn-tienda" id="btn-tienda-cap-coor">Tienda</button>
      <button class="btn-bandeja" id="btn-bandeja-cap-coor">Bandeja de entrada</button>
    </section>
  </main>

  <div class="logout-container">
    <button class="boton-logout">Cerrar sesión</button>
  </div>

<footer>
    <img id="img-footer" src="/images/LOGO_BANCOSOL_FOOTER.png" alt="Logo de Bancosol">
</footer>
</body>
</html>
